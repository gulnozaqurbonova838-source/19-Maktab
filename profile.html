<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Profile — 19-Maktab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="profile.css">
    <style>
        .dash-app { display: none !important; }
        .profile-auth-loading { display: flex; }
        body.profile-authenticated .dash-app { display: flex !important; }
        body.profile-authenticated .profile-auth-loading { display: none !important; }
    </style>
</head>
<body class="dash-body profile-body">
    <div class="dashboard-auth-loading profile-auth-loading" id="profile-auth-loading" aria-live="polite" aria-busy="true">
        <div class="dashboard-auth-loading-inner">
            <span class="dashboard-spinner" aria-hidden="true"></span>
            <p>Profil yuklanmoqda…</p>
        </div>
    </div>

    <div class="dash-app" id="profile-app" hidden>
        <div class="dash-sidebar-overlay" id="profile-sidebar-overlay" hidden></div>

        <aside class="dash-sidebar" id="profile-sidebar">
            <a href="dashboard.html" class="dash-sidebar-brand">
                <span class="dash-sidebar-mark" aria-hidden="true">19</span>
                <span>
                    <span class="dash-sidebar-title">19-Maktab</span>
                    <span class="dash-sidebar-badge">Profile</span>
                </span>
            </a>
            <nav class="dash-nav" aria-label="Asosiy menyu">
                <a href="dashboard.html" class="dash-nav-link">
                    <svg class="dash-nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 13h7V4H4v9zm9 7h7V11h-7v9zM4 20h7v-5H4v5zm9-12h7V4h-7v4z" stroke="currentColor" stroke-width="1.75"/>
                    </svg>
                    Dashboard
                </a>
                <a href="profile.html" class="dash-nav-link is-active" aria-current="page">
                    <svg class="dash-nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 12a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                    </svg>
                    Profile
                </a>
                <a href="admin.html" class="dash-nav-link" id="profile-admin-link" hidden>
                    <svg class="dash-nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 3l9 4.5v9L12 21l-9-4.5v-9L12 3z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
                    </svg>
                    Admin
                </a>
                <button type="button" class="dash-nav-link dash-nav-link--logout" id="profile-logout">
                    <svg class="dash-nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Logout
                </button>
            </nav>
        </aside>

        <div class="dash-main">
            <header class="dash-topbar">
                <button type="button" class="dash-menu-toggle" id="profile-menu-toggle" aria-label="Menyuni ochish" aria-expanded="false">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="dash-topbar-brand">
                    <span class="dash-topbar-title">19-Maktab</span>
                    <span class="dash-topbar-sub">Profil sozlamalari</span>
                </div>
                <div class="dash-topbar-user">
                    <div class="dash-topbar-user-text">
                        <span class="dash-topbar-name" id="profile-topbar-name">—</span>
                        <span class="dash-topbar-email" id="profile-topbar-email">—</span>
                    </div>
                    <div class="dash-avatar" aria-hidden="true">
                        <span id="profile-topbar-initials">—</span>
                    </div>
                </div>
            </header>

            <main class="profile-main">
                <article class="profile-card" id="profile-card" aria-busy="true">
                    <div class="profile-card-skeleton" id="profile-card-skeleton" aria-hidden="true">
                        <span class="profile-skeleton-avatar"></span>
                        <span class="profile-skeleton-line profile-skeleton-line--lg"></span>
                        <span class="profile-skeleton-line"></span>
                        <span class="profile-skeleton-line profile-skeleton-line--short"></span>
                    </div>

                    <div class="profile-card-body" id="profile-card-body" hidden>
                        <header class="profile-card-hero">
                            <div class="profile-avatar-wrap">
                                <img
                                    class="profile-avatar profile-avatar--photo"
                                    id="profile-avatar-img"
                                    src=""
                                    alt=""
                                    width="112"
                                    height="112"
                                    hidden>
                                <div class="profile-avatar profile-avatar--default" id="profile-avatar-default" aria-hidden="true">
                                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                        <path d="M12 12a4 4 0 100-8 4 4 0 000 8zM6 20v-1a6 6 0 0112 0v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                    <span class="profile-avatar-initials" id="profile-avatar-initials"></span>
                                </div>
                            </div>
                            <div class="profile-hero-text">
                                <p class="profile-page-label">Hisob profili</p>
                                <h1 id="profile-hero-name">—</h1>
                                <p class="profile-hero-email" id="profile-email">—</p>
                                <span class="profile-role-pill" id="profile-role">user</span>
                            </div>
                        </header>

                        <dl class="profile-details">
                            <div class="profile-detail">
                                <dt>Display name</dt>
                                <dd id="profile-display-name">—</dd>
                            </div>
                            <div class="profile-detail">
                                <dt>Email</dt>
                                <dd id="profile-email-detail">—</dd>
                            </div>
                            <div class="profile-detail">
                                <dt>UID</dt>
                                <dd id="profile-uid" class="profile-detail-mono">—</dd>
                            </div>
                            <div class="profile-detail">
                                <dt>Rol</dt>
                                <dd id="profile-role-detail">—</dd>
                            </div>
                            <div class="profile-detail">
                                <dt>Ro‘yxatdan o‘tgan</dt>
                                <dd id="profile-created-at">—</dd>
                            </div>
                        </dl>

                        <section class="profile-edit" aria-labelledby="profile-edit-title">
                            <h2 id="profile-edit-title">Profilni tahrirlash</h2>
                            <p class="profile-edit-lead">Ko‘rinadigan ismingizni yangilang — Firestore va Auth profilida saqlanadi.</p>
                            <p id="profile-status" class="profile-status" role="status" hidden></p>
                            <form id="profile-edit-form" class="profile-edit-form" novalidate>
                                <div class="profile-field">
                                    <label for="profile-name-input">Display name</label>
                                    <input
                                        type="text"
                                        id="profile-name-input"
                                        name="displayName"
                                        placeholder="Ismingiz"
                                        maxlength="80"
                                        autocomplete="name">
                                </div>
                                <button type="submit" class="profile-btn profile-btn--primary" id="profile-save-btn">Saqlash</button>
                            </form>
                        </section>

                        <footer class="profile-card-footer">
                            <a href="dashboard.html" class="profile-btn profile-btn--ghost">← Dashboard</a>
                            <button type="button" class="profile-btn profile-btn--danger" id="profile-logout-bottom">Logout</button>
                        </footer>
                    </div>
                </article>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-utils.js"></script>
    <script src="js/user-service.js"></script>
    <script src="js/auth-session.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
